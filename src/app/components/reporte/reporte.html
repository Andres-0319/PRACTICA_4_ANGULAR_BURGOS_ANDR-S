<div class="container">
  <h2>Reporte de Gastos</h2>
  <table class="table table-striped table-bordered">
    <thead>
      <tr>
        <th>Id</th>
        <th>Tipo Gasto</th>
        <th>RUC</th>
        <th>Valor</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let g of gastos">
        <td>{{g.id}}</td>
        <td>{{g.tipo}}</td>
        <td>{{g.ruc}}</td>
        <td>{{g.valor | currency:'USD':'symbol':'1.2-2'}}</td>
      </tr>
      <tr *ngIf="gastos.length === 0">
        <td colspan="4" class="text-center">Cargando datos...</td>
      </tr>
    </tbody>
    <tfoot *ngIf="gastos.length > 0">
      <tr>
        <td colspan="3" class="text-end"><strong>Total acumulado:</strong></td>
        <td><strong>{{ totalGastos | currency:'USD':'symbol':'1.2-2' }}</strong></td>
      </tr>
    </tfoot>
  </table>
</div>
